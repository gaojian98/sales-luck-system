<script>

// ✅ 积分
let points = 50;

// ✅ 更新积分显示
function updatePoints() {
  document.getElementById("points").innerText = "💰 当前积分：" + points;
}

// ✅ 运势函数（独立）
function generateLuck() {

  const userId = "user123";
  const date = new Date().toISOString().slice(0, 10);

  const str = userId + date;
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash += str.charCodeAt(i);
  }

  const score = hash % 100;

  let level = "";
  let text = "";

  if (score >= 80) {
    level = "大吉";
    text = "今天你不成交，客户都觉得遗憾。";
  } else if (score >= 50) {
    level = "中吉";
    text = "机会有，但你需要主动一点。";
  } else {
    level = "小凶";
    text = "今天适合铺垫关系，不适合成交。";
  }

  document.getElementById("result").innerHTML = `
    🎯 运势分数：${score}<br>
    🔮 运势等级：${level}<br>
    💬 今日提示：${text}
  `;
}

// ✅ 抽奖函数（必须独立！！）
function spin() {

  if (points < 10) {
    alert("积分不足，建议提升运势 🔋");
    return;
  }

  points -= 10;

  const rand = Math.random() * 100;
  let reward = "";
  let winPoints = 0;

  if (rand < 40) {
    reward = "谢谢参与 😢";
  } else if (rand < 70) {
    reward = "获得10积分 🎉";
    winPoints = 10;
  } else if (rand < 85) {
    reward = "获得50积分 💰";
    winPoints = 50;
  } else if (rand < 95) {
    reward = "获得100积分 🚀";
    winPoints = 100;
  } else {
    reward = "再来一次 🔁";
  }

  points += winPoints;
  updatePoints();

  document.getElementById("spinResult").innerHTML =
    "🎯 抽奖结果：" + reward;
}

// ✅ 页面加载初始化
updatePoints();

</script>
