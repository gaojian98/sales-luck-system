<h2>转盘测试</h2>

<script>
// =====================
// 🎡 基础初始化
// =====================
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const rewards = ["谢谢参与","10积分","50积分","100积分","再来一次"];
const colors = ["#444","#666","#888","#aaa","#ccc"];

let points = localStorage.getItem("points") 
  ? parseInt(localStorage.getItem("points")) 
  : 50;
let angle = 0;
let spinning = false;

// =====================
// 💰 积分更新
// =====================
function updatePoints(){
  document.getElementById("points").innerText="💰 当前积分："+points;
}

// =====================
// 🔮 运势系统（你原版逻辑恢复）
// =====================
function generateLuck(){

  const userId="user123";
  const date=new Date().toISOString().slice(0,10);

  let hash=0;
  const str=userId+date;

  for(let i=0;i<str.length;i++){
    hash+=str.charCodeAt(i);
  }

  const score=hash%100;

  let level="",text="";

  if(score>=80){
    level="大吉";
    text="今天你不成交，客户都觉得遗憾。";
  }else if(score>=50){
    level="中吉";
    text="机会有，但你需要主动一点。";
  }else{
    level="小凶";
    text="今天适合铺垫关系，不适合成交。";
  }

  document.getElementById("result").innerHTML=
    `🎯 运势分数：${score}<br>
     🔮 运势等级：${level}<br>
     💬 今日提示：${text}`;
}

// =====================
// 🎡 转盘绘制
// =====================
function drawWheel(angleDeg){
  if (!Number.isFinite(angleDeg)) angleDeg = 0;
  const arc=Math.PI*2/rewards.length;

  ctx.clearRect(0,0,300,300);

  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(angleDeg*Math.PI/180);
  ctx.translate(-150,-150);

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,arc*i,arc*(i+1));
    ctx.fill();

    ctx.save();
    ctx.fillStyle="#000";
    ctx.translate(150,150);
    ctx.rotate(arc*i+arc/2);
    ctx.fillText(rewards[i],60,10);
    ctx.restore();
  }

  ctx.restore();
}

// =====================
// 🎯 抽奖系统（带动画）
// =====================
let dailyFree = 1; // 👈 放在全局（函数外面）

function spin(){

  if(spinning) return;

  // ✅ ⭐ 插在这里（最关键位置）
  if(dailyFree > 0){
    dailyFree--;
  }else{
    if(points < 10){
      alert("积分不足！");
      return;
    }
    points -= 10;
  }

  updatePoints();

  if(spinning) return;

  if(points<10){
    alert("积分不足！");
    return;
  }

  points-=10;
  function updatePoints(){
  document.getElementById("points").innerText = "💰 当前积分：" + points;

  // ⭐ 保存到本地
  localStorage.setItem("points", points);
}

  spinning=true;

  const rand=Math.random()*100;
  let index=0;
  let reward="";
  let winPoints=0;

  if(rand<40){
    index=0;
    reward="谢谢参与 😢";
  }else if(rand<70){
    index=1;
    reward="10积分 🎉";
    winPoints=10;
  }else if(rand<85){
    index=2;
    reward="50积分 💰";
    winPoints=50;
  }else if(rand<95){
    index=3;
    reward="100积分 🚀";
    winPoints=100;
  }else{
    index=4;
    reward="再来一次 🔁";
  }

  const arc = 360 / rewards.length;

const currentAngle = Number(angle) || 0;
const finalAngle = 360 - index * arc - arc / 2;
const normalizedCurrent = ((currentAngle % 360) + 360) % 360;
const target = currentAngle + 360 * 5 + ((finalAngle - normalizedCurrent + 360) % 360);

let current = currentAngle;

  function animate() {
  current += (target - current) * 0.1;

  if (!Number.isFinite(current)) {
    spinning = false;
    return;
  }

  angle = current;
  drawWheel(angle);

  if (Math.abs(target - current) < 1) {
    angle = target;
    drawWheel(angle);

    spinning = false;
    points += winPoints;
    updatePoints();

    document.getElementById("spinResult").innerHTML =
      "🎯 抽奖结果：" + reward;
    return;
  }

  requestAnimationFrame(animate);
}

      spinning=false;

      points+=winPoints;
      updatePoints();

      document.getElementById("spinResult").innerHTML=
        "🎯 抽奖结果："+reward;
    }
  },20);
}

// =====================
// 初始化
// =====================
updatePoints();
drawWheel(0);
  
</script>

</body>
</html>
