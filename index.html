<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>测试转盘</title>
  <style>
    body { background:#111; color:#fff; text-align:center; }
    canvas { margin-top:20px; background:#222; border-radius:50%; }
    button { padding:10px 20px; margin-top:20px; }
  </style>
</head>
<body>

<h2>转盘测试</h2>

<canvas id="wheel" width="300" height="300"></canvas>
<br>
<button onclick="spin()">开始</button>

<script>
<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const rewards = ["谢谢参与","10积分","50积分","100积分","再来一次"];
const colors = ["#444","#666","#888","#aaa","#ccc"];

let points = 50;
let angle = 0;
let spinning = false;

function updatePoints(){
  document.getElementById("points").innerText="💰 当前积分："+points;
}

// 运势
function generateLuck(){
  const score=Math.floor(Math.random()*100);
  let level="",text="";

  if(score>=80){
    level="大吉";text="今天你不成交，客户都觉得遗憾。";
  }else if(score>=50){
    level="中吉";text="机会有，但你需要主动一点。";
  }else{
    level="小凶";text="今天适合铺垫关系。";
  }

  document.getElementById("result").innerHTML=
    `🎯 运势分数：${score}<br>🔮 运势等级：${level}<br>💬 ${text}`;
}

// 画转盘
function drawWheel(angleDeg){
  const arc=Math.PI*2/rewards.length;

  ctx.clearRect(0,0,300,300);

  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(angleDeg*Math.PI/180);
  ctx.translate(-150,-150);

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=colors[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150,arc*i,arc*(i+1));
    ctx.fill();

    ctx.save();
    ctx.fillStyle="#000";
    ctx.translate(150,150);
    ctx.rotate(arc*i+arc/2);
    ctx.fillText(rewards[i],60,10);
    ctx.restore();
  }

  ctx.restore();
}

// 抽奖
function spin(){
  if(spinning) return;

  if(points<10){
    alert("积分不足！");
    return;
  }

  points-=10;
  updatePoints();

  spinning=true;

  const index=Math.floor(Math.random()*5);
  const arc=360/5;
  const target=360*5+(360-index*arc-arc/2);

  let current=angle;

  const timer=setInterval(()=>{
    current+=(target-current)*0.1;
    angle=current;
    drawWheel(angle);

    if(Math.abs(target-current)<0.5){
      clearInterval(timer);
      spinning=false;

      const rewardsMap=[0,10,50,100,0];
      points+=rewardsMap[index];
      updatePoints();

      document.getElementById("spinResult").innerHTML=
        "🎯 抽奖结果："+rewards[index];
    }
  },20);
}

// 初始化
updatePoints();
drawWheel(0);
</script>
</script>

</body>
</html>
